# OpenClaw Agent Package Manifest
name: deep-research-orchestrator
version: 4.0.0
description: >
  Multi-agent deep research system. Decomposes complex research questions into
  focused subtopics, delegates to scout agents via native sub-agent spawning,
  iterates on gaps, and produces comprehensive Markdown reports with citations
  and a persistent knowledge base.
author: Deep Research Orchestrator Contributors
license: MIT
tags: [research, multi-agent, orchestration, scouts, tavily, deep-research]

openclawVersion: ">=2026.5"

skills:
  - tavily

requires:
  env:
    - description: "Model provider API key (provider-specific)"
      required: true
  services:
    - "LLM provider with model routing support"
    - "Tavily API key for advanced web search"

agents:
  orchestrator:
    id: deep-researcher
    name: Deep Diver
    emoji: 🔬
    description: >
      Research orchestrator. Plans, decomposes, coordinates scouts via sessions_spawn,
      synthesizes findings, saves Markdown reports, maintains knowledge base.
    model:
      recommended: "your-provider/your-strongest-model"
      tested: "zai/glm-5.1"
      role: "Strategic planning, decomposition, synthesis"
    tools:
      allow: [web_search, web_fetch, image, exec, read, write, edit]
    skills: [tavily]
    workspace: ./agents/orchestrator/
    subagents:
      allowAgents: [sub-researcher]

  scout:
    id: sub-researcher
    name: Scout
    emoji: 🐦
    description: >
      Focused research worker. Runs as depth-2 leaf sub-agent. Searches web on a single
      topic using tavily_search advanced, self-summarizes findings, returns structured
      brief with sources and credibility tiers.
    model:
      recommended: "your-provider/your-cheapest-capable-model"
      tested: "zai/glm-4.7"
      role: "Focused search + fetch + summarize"
    tools:
      allow: [web_search, web_fetch, image]
    skills: [tavily]
    workspace: ./agents/scout/

spawning:
  method: sessions_spawn
  agentId: sub-researcher
  parallel: true
  note: "Native sub-agent spawning with push-based completion. No CLI subprocess calls."
  nesting:
    depth0: "Main agent"
    depth1: "Deep Researcher (orchestrator, gets sessions_spawn)"
    depth2: "Scouts (leaf-only, search + fetch + summarize)"

workflow:
  phases:
    - name: SCOPE
      description: "Read request, enrich intent, check knowledge base, apply effort scaling rules, decompose into subtopics, write structured research briefs"
      turns: 1
    - name: RESEARCH
      description: "Spawn scouts via sessions_spawn (parallel), collect push-based completions, gap review, iterate (max 2 gap rounds)"
      turns: "variable (1 scout per subtopic + gap scouts)"
    - name: WRITE
      description: "Verify findings, synthesize in one shot, save Markdown report, update knowledge base, return TLDR"
      turns: 2-3

limits:
  maxScouts: 15
  maxSearchesPerScout: 8
  maxFetchesPerScout: 12
  maxGapRounds: 2
  maxWallClockMinutes: 30
  maxReportSizeKB: 30

output:
  format: Markdown
  location: "orchestrator workspace / research-reports/"
  naming: "{YYYY-MM-DD_HHMM}_{slug}"
  knowledgeBase: "research-index.json"

costEstimate:
  perRun:
    orchestratorTokens: "~15K input + ~30K output"
    scoutTokens: "~200K total across 10 scouts"
    total: "~255K tokens"
    usd: "~$0.21 (ZAI pricing)"

files:
  workspace:
    orchestrator:
      - AGENTS.md
      - SOUL.md
      - IDENTITY.md
      - TOOLS.md
    scout:
      - AGENTS.md
      - SOUL.md
      - IDENTITY.md
      - TOOLS.md
      - USER.md
  config:
    - openclaw.agents.json
  scripts:
    - setup.sh
